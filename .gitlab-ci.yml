build artifact:
  stage: build
  image: node:lts
  before_script:
    - npm install
  script:
    - export CI=false # This tells the build to ignore warning
    - npm run build
  artifacts:
    paths:
      - build/
    when: always
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "dev"'
      when: always

deploy s3:
  stage: deploy
  image:
    name: amazon/aws-cli:latest
    entrypoint:
      - "/usr/bin/env"
  id_tokens:
    ID_TOKEN:
      aud: bizbaz-audience-deploy
  script:
    - *assume_role
    - |
      if [ "$CI_COMMIT_REF_NAME" == "main" ]; then
        export FOCUS_S3_BUCKET="$S3_BUCKET"
        export FOCUS_CLOUDFRONT="$CLOUDFRONT_DISTRIBUTION_ID"
      else
        export FOCUS_S3_BUCKET="$S3_BUCKET_DEV"
        export FOCUS_CLOUDFRONT="$CLOUDFRONT_DISTRIBUTION_ID_DEV"
      fi
    - aws s3 sync build/ s3://$FOCUS_S3_BUCKET
    - aws cloudfront create-invalidation --distribution-id $FOCUS_CLOUDFRONT --paths "/*"
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "dev"'
      when: always
